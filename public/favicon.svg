<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="f5-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#050505" />

  <!-- Outer square fill -->
  <rect x="2" y="2" width="28" height="28" fill="#060e06" />

  <!-- Grid cells: cell=6, gap=1, step=7, start=6 -->
  <!-- Row 0 -->
  <rect x="6"  y="6"  width="6" height="6" fill="#22c55e" filter="url(#f5-glow)" />
  <rect x="13" y="6"  width="6" height="6" fill="#0d2210" opacity="0.7" />
  <rect x="20" y="6"  width="6" height="6" fill="#22c55e" filter="url(#f5-glow)" />
  <!-- Row 1 -->
  <rect x="6"  y="13" width="6" height="6" fill="#0d2210" opacity="0.7" />
  <rect x="13" y="13" width="6" height="6" fill="#4ade80" filter="url(#f5-glow)" />
  <rect x="20" y="13" width="6" height="6" fill="#0d2210" opacity="0.7" />
  <!-- Row 2 -->
  <rect x="6"  y="20" width="6" height="6" fill="#22c55e" filter="url(#f5-glow)" />
  <rect x="13" y="20" width="6" height="6" fill="#0d2210" opacity="0.7" />
  <rect x="20" y="20" width="6" height="6" fill="#22c55e" filter="url(#f5-glow)" />

  <!-- Corner bracket frame -->
  <g stroke="#22c55e" stroke-width="1" stroke-linecap="square" fill="none" opacity="0.6">
    <path d="M2 7  L2 2  L7 2" />
    <path d="M25 2 L30 2 L30 7" />
    <path d="M2 25 L2 30 L7 30" />
    <path d="M30 25 L30 30 L25 30" />
  </g>
</svg>
